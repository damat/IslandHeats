<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover" />
    <meta http-equiv="Cache-Control" content="no-cache, no-store, must-revalidate" />
    <meta http-equiv="Pragma" content="no-cache" />
    <meta http-equiv="Expires" content="0" />
    <title>Island Heats — Streetball Court in Phuket</title>
    <meta
      name="description"
      content="Island Heats is a streetball court in Phuket. Check the schedule and book a session via WhatsApp."
    />
    <meta name="theme-color" content="#be170e" />
    <link rel="icon" href="assets/favicon.svg" type="image/svg+xml" />
    <link rel="icon" href="assets/favicon-32.png" type="image/png" sizes="32x32" />
    <link rel="apple-touch-icon" href="assets/apple-touch-icon.png" sizes="180x180" />
    <meta property="og:type" content="website" />
    <meta property="og:site_name" content="Island Heats" />
    <meta property="og:title" content="Island Heats — Streetball Court in Phuket" />
    <meta
      property="og:description"
      content="Streetball court in Phuket. Check availability and book via WhatsApp."
    />
    <meta property="og:image" content="https://damat.github.io/IslandHeats/assets/og-court.png" />
    <meta property="og:image:alt" content="Island Heats outdoor streetball court at sunset" />
    <meta property="og:url" content="https://damat.github.io/IslandHeats/" />
    <meta name="twitter:card" content="summary_large_image" />
    <meta name="twitter:title" content="Island Heats — Streetball Court in Phuket" />
    <meta
      name="twitter:description"
      content="Streetball court in Phuket. Check availability and book via WhatsApp."
    />
    <meta name="twitter:image" content="https://damat.github.io/IslandHeats/assets/og-court.png" />
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=DM+Sans:ital,opsz,wght@0,9..40,400;0,9..40,500;0,9..40,600;0,9..40,700;1,9..40,400&display=swap"
      rel="stylesheet"
    />
    <link rel="stylesheet" href="styles.css?v=__BUILD_ID__" />
  </head>
  <body>
    <script>window.BUILD_ID = '__BUILD_ID__';</script>
    <div id="app" class="app">
      <header class="header">
        <div class="header-row">
          <div class="brand">
            <img id="brand-logo" class="brand-logo" src="assets/logo.png?v=__BUILD_ID__" alt="Island Heats" />
          </div>
          <div class="header-actions">
            <button type="button" id="btn-book-desktop" class="btn btn-primary btn-header btn-book-desktop">Book</button>
            <button type="button" id="btn-menu" class="icon-btn menu-btn menu-btn-header" aria-label="Menu" aria-expanded="false" aria-controls="menu-panel">
              <svg width="20" height="20" viewBox="0 0 20 20" fill="none" aria-hidden="true">
                <path d="M3 5H17M3 10H17M3 15H17" stroke="currentColor" stroke-width="2" stroke-linecap="round"/>
              </svg>
            </button>
          </div>
        </div>
      </header>

      <main class="main">
        <div class="desktop-day-bar day-header-desktop" aria-label="Day navigation">
          <div id="day-label" class="day-label">—</div>
          <div class="desktop-day-controls">
            <button type="button" id="btn-today-desktop" class="btn btn-secondary btn-sm btn-today-desktop">Today</button>
            <button type="button" id="btn-prev" class="icon-btn" aria-label="Previous day">
              <svg width="20" height="20" viewBox="0 0 20 20" fill="none" aria-hidden="true">
                <path d="M12.5 15L7.5 10L12.5 5" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"/>
              </svg>
            </button>
            <button type="button" id="btn-next" class="icon-btn" aria-label="Next day">
              <svg width="20" height="20" viewBox="0 0 20 20" fill="none" aria-hidden="true">
                <path d="M7.5 15L12.5 10L7.5 5" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"/>
              </svg>
            </button>
          </div>
        </div>

        <div id="schedule-scroll" class="schedule-scroll">
          <div id="schedule-status" class="schedule-status" hidden></div>
          <section id="schedule" class="schedule" aria-label="Court schedule"></section>
        </div>
      </main>

      <nav id="mobile-bar" class="mobile-bar" aria-label="Mobile navigation">
        <div class="week-nav-row">
          <button type="button" id="btn-prev-mobile" class="week-nav-btn" aria-label="Previous day">
            <svg width="20" height="20" viewBox="0 0 20 20" fill="none" aria-hidden="true">
              <path d="M12.5 15L7.5 10L12.5 5" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"/>
            </svg>
          </button>
          <div class="week-strip-scroll">
            <div id="week-strip" class="week-strip" role="tablist" aria-label="Week days"></div>
          </div>
          <button type="button" id="btn-next-mobile" class="week-nav-btn" aria-label="Next day">
            <svg width="20" height="20" viewBox="0 0 20 20" fill="none" aria-hidden="true">
              <path d="M7.5 15L12.5 10L7.5 5" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"/>
            </svg>
          </button>
        </div>
        <div class="mobile-bar-actions">
          <button type="button" id="btn-book-mobile" class="btn btn-primary btn-book-mobile">Book</button>
          <button type="button" id="btn-menu-mobile" class="icon-btn mobile-menu-btn" aria-label="Menu" aria-expanded="false" aria-controls="menu-panel">
            <svg width="22" height="22" viewBox="0 0 20 20" fill="none" aria-hidden="true">
              <path d="M3 5H17M3 10H17M3 15H17" stroke="currentColor" stroke-width="2" stroke-linecap="round"/>
            </svg>
          </button>
        </div>
      </nav>
    </div>

    <div id="menu-overlay" class="overlay menu-overlay">
      <div id="menu-panel" class="menu-panel" role="dialog" aria-modal="true" aria-label="Menu">
        <div id="menu-body" class="menu-body"></div>
        <div class="menu-panel-footer">
          <button type="button" id="menu-close" class="menu-close-btn" aria-label="Close">
            <svg width="16" height="16" viewBox="0 0 20 20" fill="none" aria-hidden="true">
              <path d="M5 5L15 15M15 5L5 15" stroke="currentColor" stroke-width="2" stroke-linecap="round"/>
            </svg>
            <span id="menu-close-label">Close</span>
          </button>
        </div>
      </div>
    </div>

    <div id="pricing-overlay" class="overlay">
      <div class="modal modal-pricing" role="dialog" aria-modal="true" aria-labelledby="pricing-title">
        <div class="modal-header">
          <h2 id="pricing-title">Pricing</h2>
          <button type="button" id="pricing-close" class="icon-btn" aria-label="Close">
            <svg width="20" height="20" viewBox="0 0 20 20" fill="none" aria-hidden="true">
              <path d="M5 5L15 15M15 5L5 15" stroke="currentColor" stroke-width="2" stroke-linecap="round"/>
            </svg>
          </button>
        </div>
        <div id="pricing-body" class="modal-body"></div>
      </div>
    </div>

    <div id="modal-overlay" class="overlay">
      <div id="modal" class="modal" role="dialog" aria-modal="true" aria-labelledby="modal-title">
        <div class="modal-header">
          <h2 id="modal-title">Details</h2>
          <button type="button" id="modal-close" class="icon-btn" aria-label="Close">
            <svg width="20" height="20" viewBox="0 0 20 20" fill="none" aria-hidden="true">
              <path d="M5 5L15 15M15 5L5 15" stroke="currentColor" stroke-width="2" stroke-linecap="round"/>
            </svg>
          </button>
        </div>
        <div id="modal-body" class="modal-body"></div>
      </div>
    </div>

    <div id="booking-overlay" class="overlay">
      <div class="modal modal-booking" role="dialog" aria-modal="true">
        <button type="button" id="booking-close" class="icon-btn icon-btn-plain modal-close-floating" aria-label="Close">
          <svg width="20" height="20" viewBox="0 0 20 20" fill="none" aria-hidden="true">
            <path d="M5 5L15 15M15 5L5 15" stroke="currentColor" stroke-width="2" stroke-linecap="round"/>
          </svg>
        </button>
        <form id="booking-form" class="booking-form"></form>
      </div>
    </div>

    <div id="booking-limit-overlay" class="overlay">
      <div class="modal modal-booking modal-sheet" role="dialog" aria-modal="true" aria-labelledby="booking-limit-title">
        <button type="button" id="booking-limit-close" class="icon-btn icon-btn-plain modal-close-floating" aria-label="Close">
          <svg width="20" height="20" viewBox="0 0 20 20" fill="none" aria-hidden="true">
            <path d="M5 5L15 15M15 5L5 15" stroke="currentColor" stroke-width="2" stroke-linecap="round"/>
          </svg>
        </button>
        <div class="sheet-body">
          <h2 id="booking-limit-title" class="sheet-title"></h2>
          <p id="booking-limit-text" class="sheet-text"></p>
          <div id="booking-limit-actions" class="sheet-actions"></div>
        </div>
      </div>
    </div>

    <div id="toast" class="toast" hidden role="status"></div>

    <script type="module" src="js/main.js?v=__BUILD_ID__"></script>
  </body>
</html>
